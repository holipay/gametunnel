name: CI

on: [push, pull_request]

jobs:
  check-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject binary files in PR
        run: |
          rejected=0
          for f in $(git diff --name-only --diff-filter=ACMR HEAD~1..HEAD 2>/dev/null || git ls-files); do
            [ -f "$f" ] || continue
            case $(od -A n -t x1 -N 4 "$f" 2>/dev/null | tr -d ' ') in
              7f454c46|4d5a*)
                echo "::error file=$f::Binary file detected in commit"
                rejected=1
                ;;
            esac
          done
          [ "$rejected" -eq 0 ] || exit 1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go build -mod=vendor ./cmd/server
      - run: go build -mod=vendor ./cmd/client
      - run: go vet -mod=vendor ./...
      - run: go test -count=1 -mod=vendor ./...
      - name: Check AppVersion matches git tag
        run: |
          scripts/sync-version.sh || {
            echo "::error::AppVersion in protocol.go does not match the git tag."
            echo "::error::Run 'scripts/sync-version.sh --update' locally, commit, and push."
            exit 1
          }
