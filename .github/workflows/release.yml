name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test -race ./internal/...

  # ── Server (Linux) ────────────────────────────────────────────

  release-server-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build server (amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o gtunnel-server ./cmd/server

      - name: Package server (amd64)
        run: tar czf GameTunnel-Server-linux-amd64.tar.gz gtunnel-server

      - name: Build server (arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o gtunnel-server-arm64 ./cmd/server

      - name: Package server (arm64)
        run: |
          mv gtunnel-server-arm64 gtunnel-server
          tar czf GameTunnel-Server-linux-arm64.tar.gz gtunnel-server

      - uses: actions/upload-artifact@v4
        with:
          name: server-linux
          path: GameTunnel-Server-linux-*.tar.gz

  # ── Server (Windows) ──────────────────────────────────────────

  release-server-windows:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build server (amd64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o gtunnel-server.exe ./cmd/server

      - name: Package server (amd64)
        run: zip GameTunnel-Server-windows-amd64.zip gtunnel-server.exe

      - name: Build server (arm64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o gtunnel-server-arm64.exe ./cmd/server

      - name: Package server (arm64)
        run: |
          mv gtunnel-server-arm64.exe gtunnel-server.exe
          zip GameTunnel-Server-windows-arm64.zip gtunnel-server.exe

      - uses: actions/upload-artifact@v4
        with:
          name: server-windows
          path: GameTunnel-Server-windows-*.zip

  # ── Windows Client (交叉编译, CGO_ENABLED=0) ────────────────

  release-client-windows:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build client (amd64)
        run: GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o gtunnel-client.exe ./cmd/client

      - name: Build client (arm64)
        run: GOOS=windows GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o gtunnel-client-arm64.exe ./cmd/client

      - name: Download wintun.dll
        run: |
          curl -sL -o wintun.zip "https://www.wintun.net/builds/wintun-0.14.1.zip"
          unzip -q wintun.zip "wintun/bin/amd64/wintun.dll"
          mv wintun/bin/amd64/wintun.dll wintun.dll
          rm -rf wintun wintun.zip

      - name: Package client (amd64)
        run: |
          cp configs/config.ini .
          zip GameTunnel-Client-windows-amd64.zip gtunnel-client.exe wintun.dll config.ini

      - name: Package client (arm64)
        run: |
          cp configs/config.ini .
          zip GameTunnel-Client-windows-arm64.zip gtunnel-client-arm64.exe config.ini

      - uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: GameTunnel-Client-windows-*.zip

  # ── Create GitHub Release ─────────────────────────────────

  publish:
    needs: [release-server-linux, release-server-windows, release-client-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            GameTunnel-Server-linux-amd64.tar.gz
            GameTunnel-Server-linux-arm64.tar.gz
            GameTunnel-Server-windows-amd64.zip
            GameTunnel-Server-windows-arm64.zip
            GameTunnel-Client-windows-amd64.zip
            GameTunnel-Client-windows-arm64.zip
