name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test -race ./internal/...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git describe
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      # ── Server ────────────────────────────────────────────────

      - name: Build server (amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o gtunnel-server ./cmd/server

      - name: Package server (amd64)
        run: tar czf GameTunnel-linux-amd64.tar.gz gtunnel-server

      - name: Build server (arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o gtunnel-server-arm64 ./cmd/server

      - name: Package server (arm64)
        run: |
          mv gtunnel-server-arm64 gtunnel-server
          tar czf GameTunnel-linux-arm64.tar.gz gtunnel-server
          rm gtunnel-server

      # ── Client ────────────────────────────────────────────────

      - name: Build client (amd64)
        run: GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o gtunnel-client.exe ./cmd/client

      - name: Download wintun.dll
        run: |
          curl -sL -o wintun.zip "https://www.wintun.net/builds/wintun-0.14.1.zip"
          unzip -q wintun.zip "wintun/bin/amd64/wintun.dll"
          mv wintun/bin/amd64/wintun.dll wintun.dll
          rm -rf wintun wintun.zip

      - name: Package client
        run: |
          cp configs/config.ini .
          zip GameTunnel-windows-amd64.zip gtunnel-client.exe wintun.dll config.ini

      # ── Create Release ────────────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            GameTunnel-linux-amd64.tar.gz
            GameTunnel-linux-arm64.tar.gz
            GameTunnel-windows-amd64.zip
