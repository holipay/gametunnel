<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GameTunnel</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --border: #2a2a3e;
    --text: #e0e0e0;
    --muted: #888;
    --accent: #00d4ff;
    --green: #00c853;
    --yellow: #ffc107;
    --red: #ff5252;
    --input-bg: #16213e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 560px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 1.6em;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .header .subtitle {
    color: var(--muted);
    font-size: 0.85em;
  }

  /* Status indicator */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px;
    background: var(--card);
    border-radius: 12px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    transition: border-color 0.3s;
  }
  .status-bar.connected { border-color: var(--green); }
  .status-bar.connecting { border-color: var(--yellow); }
  .status-bar.error { border-color: var(--red); }
  .status-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .status-dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.waiting { background: var(--yellow); animation: pulse 1s infinite; }
  .status-dot.off { background: var(--red); }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .status-text { font-weight: 600; font-size: 1.05em; }
  .status-detail { color: var(--muted); font-size: 0.85em; margin-left: 4px; }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.9em;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Form */
  .form-row {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
  }
  .form-row:last-child { margin-bottom: 0; }
  .form-label {
    width: 72px;
    flex-shrink: 0;
    font-size: 0.88em;
    color: var(--muted);
  }
  .form-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 0.92em;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: #555; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 0.95em;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover:not(:disabled) { opacity: 0.85; }
  .btn-danger {
    background: var(--red);
    color: #fff;
  }
  .btn-danger:hover:not(:disabled) { opacity: 0.85; }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-item {
    background: var(--input-bg);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .stat-value {
    font-size: 1.3em;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 0.78em;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Peer list */
  .peer-list {
    list-style: none;
  }
  .peer-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 0.9em;
  }
  .peer-item:last-child { border-bottom: none; }
  .peer-name {
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .peer-ip { color: var(--muted); font-size: 0.85em; }
  .peer-rtt {
    font-size: 0.82em;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--input-bg);
  }
  .peer-rtt.good { color: var(--green); }
  .peer-rtt.mid { color: var(--yellow); }
  .peer-rtt.bad { color: var(--red); }
  .empty-hint {
    color: var(--muted);
    text-align: center;
    padding: 20px;
    font-size: 0.88em;
  }

  /* Error banner */
  .error-banner {
    background: rgba(255,82,82,0.1);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 0.88em;
    color: var(--red);
    display: none;
  }
  .error-banner.show { display: block; }

  /* Footer */
  .footer {
    text-align: center;
    color: #444;
    font-size: 0.75em;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🎮 GameTunnel</h1>
    <div class="subtitle">局域网游戏隧道</div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">检查中...</span>
    <span class="status-detail" id="statusDetail"></span>
  </div>

  <!-- Error Banner -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- Config Card -->
  <div class="card">
    <div class="card-title">⚙️ 服务器配置</div>
    <div class="form-row">
      <span class="form-label">服务器</span>
      <input class="form-input" id="inputServer" placeholder="1.2.3.4:4700">
    </div>
    <div class="form-row">
      <span class="form-label">玩家名</span>
      <input class="form-input" id="inputName" placeholder="Player1">
    </div>
    <div class="form-row">
      <span class="form-label">房间</span>
      <input class="form-input" id="inputRoom" placeholder="default">
    </div>
    <div class="form-row">
      <span class="form-label">密码</span>
      <input class="form-input" id="inputPass" type="password" placeholder="留空则无密码">
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="btnSave" onclick="saveConfig()">💾 保存配置</button>
      <button class="btn btn-primary" id="btnConnect" onclick="doConnect()">⚡ 一键加入</button>
      <button class="btn btn-danger" id="btnDisconnect" onclick="doDisconnect()" style="display:none">🔌 断开</button>
    </div>
  </div>

  <!-- Stats Card -->
  <div class="card" id="statsCard" style="display:none">
    <div class="card-title">📊 连接信息</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="statIP">--</div>
        <div class="stat-label">虚拟 IP</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statRTT">--</div>
        <div class="stat-label">延迟</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statServer">--</div>
        <div class="stat-label">服务器</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statUptime">--</div>
        <div class="stat-label">运行时间</div>
      </div>
    </div>
  </div>

  <!-- Peers Card -->
  <div class="card" id="peersCard" style="display:none">
    <div class="card-title">👥 在线玩家</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="statPeers">0</div>
        <div class="stat-label">在线人数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statRoom">--</div>
        <div class="stat-label">房间</div>
      </div>
    </div>
  </div>

  <div class="footer">GameTunnel · 局域网游戏隧道</div>

</div>

<script>
const $ = id => document.getElementById(id);

// ── SSE: Real-time status ──────────────────────────────────
let evtSource = null;

function startSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource('/api/status');
  evtSource.onmessage = e => {
    try {
      const s = JSON.parse(e.data);
      updateUI(s);
    } catch(err) {}
  };
  evtSource.onerror = () => {
    setTimeout(startSSE, 3000);
  };
}

function updateUI(s) {
  const bar = $('statusBar');
  const dot = $('statusDot');
  const text = $('statusText');
  const detail = $('statusDetail');
  const error = $('errorBanner');

  bar.className = 'status-bar';

  if (s.connecting) {
    bar.classList.add('connecting');
    dot.className = 'status-dot waiting';
    text.textContent = '🟡 连接中...';
    detail.textContent = '';
  } else if (s.connected) {
    bar.classList.add('connected');
    dot.className = 'status-dot on';
    text.textContent = '🟢 已连接';
    detail.textContent = s.virtual_ip || '';
  } else {
    dot.className = 'status-dot';
    text.textContent = '🔴 未连接';
    detail.textContent = '';
    if (s.last_error) {
      bar.classList.add('error');
      dot.className = 'status-dot off';
    }
  }

  // Error banner
  if (s.last_error && !s.connected && !s.connecting) {
    error.textContent = '⚠️ ' + s.last_error;
    error.classList.add('show');
  } else {
    error.classList.remove('show');
  }

  // Buttons
  const btnConn = $('btnConnect');
  const btnDisc = $('btnDisconnect');
  if (s.connected || s.connecting) {
    btnConn.style.display = 'none';
    btnDisc.style.display = '';
    btnDisc.disabled = !s.connected && !s.connecting;
  } else {
    btnConn.style.display = '';
    btnDisc.style.display = 'none';
  }

  // Stats
  const statsCard = $('statsCard');
  if (s.connected) {
    statsCard.style.display = '';
    $('statIP').textContent = s.virtual_ip || '--';
    $('statRTT').textContent = s.rtt ? s.rtt + 'ms' : '--';
    $('statServer').textContent = s.server_ip || '--';
    $('statUptime').textContent = s.uptime || '--';
  } else {
    statsCard.style.display = 'none';
  }

  // Peers
  const peersCard = $('peersCard');
  if (s.connected) {
    peersCard.style.display = '';
    $('statPeers').textContent = s.peer_count || 0;
    $('statRoom').textContent = s.room_id || '--';
  } else {
    peersCard.style.display = 'none';
  }

  // Config fields (only update if not focused)
  if (document.activeElement !== $('inputServer'))
    $('inputServer').value = s.server_addr || '';
  if (document.activeElement !== $('inputName'))
    $('inputName').value = s.player_name || '';
  if (document.activeElement !== $('inputRoom'))
    $('inputRoom').value = s.room_id || '';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── API calls ──────────────────────────────────────────────

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const cfg = await r.json();
    $('inputServer').value = cfg.ServerAddr || '';
    $('inputName').value = cfg.PlayerName || '';
    $('inputRoom').value = cfg.RoomID || '';
    $('inputPass').value = cfg.RoomPassword || '';
  } catch(e) {}
}

async function saveConfig() {
  const cfg = {
    server_addr: $('inputServer').value.trim(),
    player_name: $('inputName').value.trim(),
    room_id: $('inputRoom').value.trim(),
    password: $('inputPass').value,
  };
  try {
    await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(cfg),
    });
    // Visual feedback
    const btn = $('btnSave');
    btn.textContent = '✅ 已保存';
    setTimeout(() => btn.textContent = '💾 保存配置', 1500);
  } catch(e) {
    alert('保存失败: ' + e.message);
  }
}

async function doConnect() {
  // Save config first
  await saveConfig();
  // Small delay for config to take effect
  setTimeout(async () => {
    try {
      await fetch('/api/connect', {method: 'POST'});
    } catch(e) {
      alert('连接失败: ' + e.message);
    }
  }, 200);
}

async function doDisconnect() {
  try {
    await fetch('/api/disconnect', {method: 'POST'});
  } catch(e) {}
}

// ── Init ───────────────────────────────────────────────────

loadConfig();
startSSE();

// Enter key triggers connect
document.querySelectorAll('.form-input').forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') doConnect();
  });
});
</script>
</body>
</html>
