# GameTunnel Host 模式配置文件
# 主机模式 = 服务端 + 客户端合一，其他玩家直接连接你的公网 IP

# ── 服务端配置 ──
# 监听地址（0.0.0.0 绑定所有接口，其他玩家可直接连接）
addr=:4700
# 虚拟子网（CIDR 格式）
subnet=10.10.0.0/24
# 最大玩家数
max=10
# 房间密码（留空 = 无密码）
password=
# TCP 回退监听地址（留空 = 禁用）
tcp-addr=
# 详细日志（true / false）
verbose=false
# 端口（仅当 addr 不含端口时生效，例如 addr=0.0.0.0 + port=8080）
#port=

# ── 客户端配置 ──
# 玩家名称（留空 = 使用计算机名）
name=
# 房间 ID
room=default
# 语言（zh 中文 / en 英文）
lang=zh
