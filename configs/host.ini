# GameTunnel Host 模式配置文件
# 主机模式 = 服务端 + 客户端合一，其他玩家直接连接你的公网 IP

# ── 服务端配置 ──
# 监听地址（0.0.0.0 绑定所有接口，其他玩家可直接连接）
addr=:4700
# 虚拟子网（CIDR 格式）
subnet=10.10.0.0/24
# 最大玩家数
max=10
# 房间密码（留空 = 无密码）
password=
# TCP 回退监听地址（留空 = 禁用）
tcp-addr=
# 详细日志（true / false）
verbose=false
# 每 IP 最大连接数（默认 3）
#max-per-ip=3
# 带宽限制（bytes/sec，0 = 无限制，默认 10Mbps = 10485760）
#bandwidth-limit=10485760
# 状态持久化目录（留空 = 禁用）
#state-dir=
# 状态页 HTTP 地址（留空 = 禁用）
#status-addr=
# 状态页访问 Token（留空 = 无认证）
#status-token=
# 多房间模式（true / false）
#multi-room=false
# 多房间模式最大房间数（默认 64）
#max-rooms=64
# 日志文件路径（留空 = 仅输出到控制台）
#log-file=
# 端口（仅当 addr 不含端口时生效）
#port=

# ── 客户端配置 ──
# 玩家名称（留空 = 使用计算机名）
name=
# 房间 ID
room=default
# 语言（zh 中文 / en 英文）
lang=zh
